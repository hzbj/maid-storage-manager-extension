name: Feature Request
description: 提议与女仆仓管扩展范围相关的新功能或改进
title: "[Feature] "
labels:
  - enhancement
body:
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue，没有找到相同提议。
          required: true
        - label: 这个提议属于本扩展，不要求修改上游 Mod。
          required: true
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 描述实际使用场景和当前障碍，不要只写希望增加的按钮或配置项。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 说明你期望的行为、边界和失败时应如何处理。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 已尝试的替代方案
  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 可附版本、截图、示例布局或相关 Issue。
