name: Bug Report
description: 报告可复现的崩溃、异常行为或兼容性问题
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请先确认问题与本扩展有关，并删除日志中的服务器地址、令牌等隐私信息。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue，没有找到相同问题。
          required: true
        - label: 我会把扩展问题留在本仓库，不向上游项目重复提交。
          required: true
  - type: input
    id: extension_version
    attributes:
      label: 扩展版本
      placeholder: 例如 1.2.0
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 运行环境与完整版本
      description: 请列出 Minecraft、Forge、Touhou Little Maid、Maid Storage Manager、Touhou Little Maid Spell、Cloth Config 和相关兼容 Mod 的版本。
      placeholder: |
        Minecraft 1.20.1
        Forge 47.x
        单人游戏 / 专用服务器
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志与崩溃报告
      description: 可直接拖入 latest.log、debug.log 或 crash-report 文件。请不要只截取最后几行。
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 是否能稳定复现、移除本扩展后是否消失，以及必要的截图或存档说明。
